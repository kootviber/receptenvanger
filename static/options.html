<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Receptenvanger instellingen</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="app-shell options-shell">
    <main class="panel">
      <header class="panel-header">
        <div>
          <p class="eyebrow">Lokale instellingen</p>
          <h1>OpenAI configuratie</h1>
        </div>
      </header>

      <form id="settings-form" class="stack">
        <label class="field">
          <span>OpenAI API key</span>
          <input id="api-key" type="password" autocomplete="off" placeholder="sk-..." />
        </label>

        <label class="field">
          <span>Model</span>
          <input id="model" type="text" placeholder="gpt-4.1-mini" />
        </label>

        <div class="button-row">
          <button class="primary-button" type="submit">Opslaan</button>
          <button id="clear-api-key" class="secondary-button" type="button">Verwijder key</button>
        </div>
      </form>

      <p class="muted">
        De key wordt alleen lokaal in `chrome.storage.local` opgeslagen voor deze extensie en wordt niet in de repo geschreven.
      </p>
      <p id="status" class="status">Nog geen wijzigingen opgeslagen.</p>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
</html>
